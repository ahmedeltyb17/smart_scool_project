<div class="dm-wrap">
  <div class="dm-header">
    <div>
      <h1 class="dm-title">Learning Materials</h1>
      <p class="dm-sub">Review files and educational content uploaded by teachers</p>
    </div>
  </div>

  <div class="dm-grid">
    <div class="dm-card" *ngFor="let m of materials">
      <div class="dm-icon"><i class="fas" [class]="fileIcon(m.fileType)"></i></div>
      <h3 class="dm-card-title">{{ m.title }}</h3>
      <p class="dm-card-meta">{{ m.teacherName }} · {{ m.className }}</p>
      <div class="dm-footer">
        <span class="dm-pill">{{ m.fileType }}</span>
        <span class="dm-size">{{ m.size }}</span>
      </div>
    </div>
  </div>

  <div class="dm-empty" *ngIf="materials.length === 0">
    <i class="fas fa-folder-open"></i>
    <p>No learning materials uploaded yet</p>
  </div>
</div>
