<div class="dst-wrap">
  <div class="dst-header">
    <div>
      <h1 class="dst-title">Settings</h1>
      <p class="dst-sub">Manage school information and academic year settings</p>
    </div>
  </div>

  <div class="dst-card">
    <div class="dst-row">
      <label>School Name</label>
      <input type="text" class="dst-input" [(ngModel)]="form.schoolName" />
    </div>
    <div class="dst-row">
      <label>Academic Year</label>
      <input type="text" class="dst-input" [(ngModel)]="form.academicYear" />
    </div>
    <div class="dst-row">
      <label>Current Term</label>
      <select class="dst-input" [(ngModel)]="form.currentTerm">
        <option>First Term</option>
        <option>Second Term</option>
      </select>
    </div>
    <button class="dst-btn-primary" (click)="saveSettings()">
      <i class="fas fa-check"></i> Save Changes
    </button>
    <span class="dst-saved" *ngIf="saved"><i class="fas fa-circle-check"></i> Saved successfully</span>
  </div>
</div>
